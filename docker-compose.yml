version: '3.8'

services:
  mtg-request-bot:
    build: .
    container_name: mtg-request-bot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL_PROD=${DATABASE_URL_PROD}
      - DATABASE_URL=${DATABASE_URL}
      - DISCORD_PUBLIC_KEY=${DISCORD_PUBLIC_KEY}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_APPLICATION_ID=${DISCORD_APPLICATION_ID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=3000
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    networks:
      - app-network
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  postgres:
    # Your existing PostgreSQL service configuration
    # This assumes you already have a postgres service defined
    # If not, uncomment and configure:
    # image: postgres:15
    # container_name: mtg-postgres
    # environment:
    #   - POSTGRES_DB=${POSTGRES_DB}
    #   - POSTGRES_USER=${POSTGRES_USER}
    #   - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    # volumes:
    #   - postgres_data:/var/lib/postgresql/data
    # networks:
    #   - app-network

networks:
  app-network:
    external: true  # Use existing network, or set to false to create new

# volumes:
#   postgres_data:

